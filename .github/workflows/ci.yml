name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Build doesn't actually connect to a database, but Prisma + the auth
      # config need these env vars to load. Dummy values are fine.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      AUTH_SECRET: ci-only-secret-not-used-at-build-time-aaaaaaaaaaaaaaaa
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Skip the embedded-postgres binary postinstall (saves ~50 MB and
          # we don't need it in CI).
          CI: true

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test --run

      - name: Build
        run: pnpm next build
